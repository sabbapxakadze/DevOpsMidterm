<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .calculator {
      width: 300px;
      background: #1e293b;
      border-radius: 28px;
      overflow: hidden;
      box-shadow:
        0 30px 70px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.06);
    }

    /* Display */
    .display {
      padding: 28px 22px 18px;
      background: #0f172a;
      text-align: right;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 4px;
    }

    .expr {
      font-size: 0.82rem;
      color: #475569;
      min-height: 1.1em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .current {
      font-size: 2.6rem;
      font-weight: 300;
      color: #f1f5f9;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.1;
      transition: color 0.15s;
    }

    .current.is-error { font-size: 1rem; color: #f87171; }

    /* Button grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #0f172a;
    }

    button {
      border: none;
      height: 68px;
      font-size: 1.15rem;
      font-weight: 400;
      cursor: pointer;
      transition: filter 0.1s, transform 0.08s;
      outline: none;
      user-select: none;
    }

    button:active { transform: scale(0.92); filter: brightness(1.25); }

    .n { background: #1e293b; color: #e2e8f0; }
    .n:hover { background: #283548; }

    .op {
      background: #172554;
      color: #93c5fd;
      font-size: 1.35rem;
    }
    .op:hover { background: #1d4ed8; color: #fff; }
    .op.lit { background: #2563eb; color: #fff; }

    .eq {
      background: #064e3b;
      color: #6ee7b7;
      font-size: 1.35rem;
    }
    .eq:hover { background: #059669; color: #fff; }

    .cl { background: #3b0f0f; color: #fca5a5; }
    .cl:hover { background: #b91c1c; color: #fff; }

    .ut { background: #1e293b; color: #64748b; font-size: 1rem; }
    .ut:hover { background: #283548; color: #94a3b8; }

    .span2 {
      grid-column: span 2;
      text-align: left;
      padding-left: 26px;
    }

    /* Footer link */
    .footer {
      margin-top: 18px;
      font-size: 0.72rem;
      color: #334155;
    }
    .footer a { color: #475569; text-decoration: none; }
    .footer a:hover { color: #64748b; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="current" id="current">0</div>
    </div>
    <div class="buttons">
      <button class="cl"  onclick="clearAll()">C</button>
      <button class="ut"  onclick="toggleSign()">+/−</button>
      <button class="ut"  onclick="percent()">%</button>
      <button class="op"  id="op-/" onclick="setOp('/')">÷</button>

      <button class="n" onclick="digit('7')">7</button>
      <button class="n" onclick="digit('8')">8</button>
      <button class="n" onclick="digit('9')">9</button>
      <button class="op" id="op-*" onclick="setOp('*')">×</button>

      <button class="n" onclick="digit('4')">4</button>
      <button class="n" onclick="digit('5')">5</button>
      <button class="n" onclick="digit('6')">6</button>
      <button class="op" id="op--" onclick="setOp('-')">−</button>

      <button class="n" onclick="digit('1')">1</button>
      <button class="n" onclick="digit('2')">2</button>
      <button class="n" onclick="digit('3')">3</button>
      <button class="op" id="op-+" onclick="setOp('+')">+</button>

      <button class="n span2" onclick="digit('0')">0</button>
      <button class="n"  onclick="addDot()">.</button>
      <button class="eq" onclick="calculate()">=</button>
    </div>
  </div>
  <p class="footer"><a href="/health" target="_blank">GET /health</a></p>

  <script>
    const elCurrent = document.getElementById('current');
    const elExpr    = document.getElementById('expr');

    let cur = '0';
    let first = null;
    let op = null;
    let waiting = false;   // waiting for second operand
    let fresh = false;     // result just shown

    const SYM = { '+': '+', '-': '−', '*': '×', '/': '÷' };

    function render() {
      elCurrent.textContent = cur;
      elCurrent.className = 'current';
    }

    function digit(d) {
      if (waiting) { cur = d; waiting = false; }
      else if (fresh) { cur = d; fresh = false; }
      else cur = (cur === '0') ? d : cur + d;
      if (cur.replace(/[-.]/, '').length > 12) return;
      render();
    }

    function addDot() {
      if (waiting) { cur = '0.'; waiting = false; return render(); }
      if (!cur.includes('.')) cur += '.';
      render();
    }

    function setOp(newOp) {
      // chain: compute pending result before storing new op
      if (op && !waiting) {
        _doCalc(true).then(() => {
          first = parseFloat(cur);
          op = newOp;
          waiting = true;
          elExpr.textContent = `${first} ${SYM[newOp]}`;
          _highlight(newOp);
        });
        return;
      }
      first = parseFloat(cur);
      op = newOp;
      waiting = true;
      fresh = false;
      elExpr.textContent = `${first} ${SYM[newOp]}`;
      _highlight(newOp);
    }

    function calculate() {
      if (op !== null && first !== null) _doCalc(false);
    }

    async function _doCalc(chaining) {
      const a = first;
      const b = parseFloat(cur);
      if (!chaining) elExpr.textContent = `${a} ${SYM[op]} ${b} =`;

      try {
        const resp = await fetch('/calculate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ a, b, op })
        });
        const data = await resp.json();

        if (!resp.ok) {
          elCurrent.textContent = data.error || 'Error';
          elCurrent.className = 'current is-error';
          _reset(); return;
        }

        const r = data.result;
        cur = Number.isInteger(r) ? String(r) : String(parseFloat(r.toFixed(10)));
        render();

        if (!chaining) { first = null; op = null; fresh = true; _highlight(null); }
      } catch {
        elCurrent.textContent = 'No connection';
        elCurrent.className = 'current is-error';
        _reset();
      }
    }

    function clearAll() {
      _reset();
      cur = '0';
      elExpr.textContent = '';
      render();
    }

    function _reset() {
      first = null; op = null; waiting = false; fresh = false;
      _highlight(null);
    }

    function toggleSign() {
      if (cur !== '0') cur = cur.startsWith('-') ? cur.slice(1) : '-' + cur;
      render();
    }

    function percent() {
      cur = String(parseFloat(cur) / 100);
      render();
    }

    function _highlight(active) {
      ['+', '-', '*', '/'].forEach(o => {
        document.getElementById('op-' + o)
          .classList.toggle('lit', o === active && waiting);
      });
    }

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') return digit(e.key);
      if (e.key === '.')                 return addDot();
      if (e.key === '+')                 return setOp('+');
      if (e.key === '-')                 return setOp('-');
      if (e.key === '*')                 return setOp('*');
      if (e.key === '/')  { e.preventDefault(); return setOp('/'); }
      if (e.key === 'Enter' || e.key === '=') return calculate();
      if (e.key === 'Escape')            return clearAll();
      if (e.key === 'Backspace') {
        cur = cur.length > 1 ? cur.slice(0, -1) : '0';
        render();
      }
    });
  </script>
</body>
</html>
